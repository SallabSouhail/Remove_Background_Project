version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto21
    commands:
      - echo "Install phase started on $(date)"
      - java -version
      - |
        if ! docker info >/dev/null 2>&1; then
          echo "Starting Docker daemon..."
          nohup /usr/local/bin/dockerd --host=unix:///var/run/docker.sock --storage-driver=overlay2 &
          timeout 30 sh -c "until docker info; do echo waiting for docker; sleep 1; done"
        fi

  pre_build:
    commands:
      - echo "Pre-build phase started on $(date)"
      - chmod +x server/mvnw
      - ./server/mvnw -f server/pom.xml -v
      - export AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - export IMAGE_REPO_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/removebg/server-registry
      - export COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - export IMAGE_TAG=${COMMIT_HASH:=latest}
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $IMAGE_REPO_URI

  build:
    commands:
      - echo "Build phase started on $(date)"
      - ./server/mvnw -f server/pom.xml clean verify -Pcoverage
      - |
        if [ -n "$SONAR_HOST_URL" ] && [ -n "$SONAR_PROJECT_KEY" ] && [ -n "$SONAR_TOKEN" ]; then
          ./server/mvnw -f server/pom.xml org.sonarsource.scanner.maven:sonar-maven-plugin:5.5.0.6356:sonar \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.projectKey=$SONAR_PROJECT_KEY \
            -Dsonar.token=$SONAR_TOKEN
        else
          echo "Skipping SonarQube analysis because SONAR_HOST_URL, SONAR_PROJECT_KEY, or SONAR_TOKEN is not set."
        fi
      - echo "Building Docker image..."
      - docker build -t $IMAGE_REPO_URI:$IMAGE_TAG -t $IMAGE_REPO_URI:latest ./server
      - docker tag $IMAGE_REPO_URI:$IMAGE_TAG $IMAGE_REPO_URI:$IMAGE_TAG
      - docker tag $IMAGE_REPO_URI:latest $IMAGE_REPO_URI:latest

  post_build:
    commands:
      - echo "Post-build phase started on $(date)"
      - echo "Pushing Docker images to ECR..."
      - docker push $IMAGE_REPO_URI:$IMAGE_TAG
      - docker push $IMAGE_REPO_URI:latest
      - printf '[{"name":"removebg-api","imageUri":"%s"}]' "$IMAGE_REPO_URI:$IMAGE_TAG" > imagedefinitions.json
      - echo "Build completed on $(date)"

reports:
  junit_reports:
    files:
      - "*.xml"
    base-directory: "server/target/surefire-reports"
    file-format: JUNITXML

  jacoco_reports:
    files:
      - "jacoco.xml"
    base-directory: "server/target/site/jacoco"
    file-format: JACOCOXML

artifacts:
  files:
    - imagedefinitions.json
    - server/target/surefire-reports/*.xml
    - server/target/site/jacoco/jacoco.xml
    - server/target/site/jacoco/index.html
    - server/target/site/jacoco/**/*
  discard-paths: no

cache:
  paths:
    - "/root/.m2/**/*"
