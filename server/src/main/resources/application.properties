spring.application.name=removebg

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/removebgdb?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
server.port=${SERVER_PORT:8080}
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_ORG_HIBERNATE_SQL:INFO}
logging.level.org.hibernate.orm.jdbc.bind=${LOGGING_LEVEL_ORG_HIBERNATE_ORM_JDBC_BIND:INFO}

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Clerk Config
clerk.issuer=${CLERK_ISSUER:}
clerk.jwks-url=${CLERK_JWKS_URL:}
clerk.allowed-clock-skew-seconds=${CLERK_ALLOWED_CLOCK_SKEW_SECONDS:60}

# Stripe Config
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
stripe.checkout-success-url=${STRIPE_CHECKOUT_SUCCESS_URL:http://localhost:5173/payment/success?session_id={CHECKOUT_SESSION_ID}}
stripe.checkout-cancel-url=${STRIPE_CHECKOUT_CANCEL_URL:http://localhost:5173/payment/cancel}
stripe.prices.basic=${STRIPE_PRICE_ID_BASIC:}
stripe.prices.premium=${STRIPE_PRICE_ID_PREMIUM:}
stripe.prices.ultimate=${STRIPE_PRICE_ID_ULTIMATE:}

#Removebg API Config
removebg.api-key=${REMOVEBG_API_KEY:}
removebg.base-url=${REMOVEBG_BASE_URL:https://api.remove.bg/v1.0}

# Frontend origins allowed to call this API from the browser.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# File upload configuration
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:2GB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:2GB}
